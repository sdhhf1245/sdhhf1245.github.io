<!doctype html>
<head>
  <meta name="view-transition" content="same-origin" />
  <link rel="stylesheet" href="style.css" />
  <link
    defer=""
    media="all"
    onload="this.media='all'"
    rel="stylesheet"
    href="https://site-assets.fontawesome.com/releases/v7.1.0/css/fontawesome.css"
  />
  <link
    defer=""
    media="all"
    onload="this.media='all'"
    rel="stylesheet"
    href="https://site-assets.fontawesome.com/releases/v7.1.0/css/whiteboard-semibold.css"
  />
</head>
<body>
  <div class="bg">
    <div class="header">
      <h1 class="name">
        ss<span style="font-size: 20px; opacity: 0.5"> (sdhhf)</span>
      </h1>
      <div id="navbar"></div>
    </div>
    <br />
    <div class="content">
      <div class="activities"></div>
      <div class="icon" style="padding-top: 5px">
        <p style="font-size: 14px">
          provided by
          <strong
            ><a
              href="https://github.com/Phineas/lanyard"
              target="_blank"
              style="font-size: 14px; text-decoration: underline"
              >lanyard</a
            ></strong
          >
        </p>
        <i
          class="fa-whiteboard fa-semibold fa-arrow-up-right-from-square"
          style="font-size: 14px"
        ></i>
      </div>
    </div>
    <article class="wrapper">
      <div class="marquee">
        <div class="marquee__group">
          <p>冬来りなば春遠からじ</p>
          <p>努力は夢中に勝てない。</p>
        </div>

        <div aria-hidden="true" class="marquee__group">
          <p>冬来りなば春遠からじ</p>
          <p>努力は夢中に勝てない。</p>
        </div>

        <div aria-hidden="true" class="marquee__group">
          <p>冬来りなば春遠からじ</p>
          <p>努力は夢中に勝てない。</p>
        </div>
        <div aria-hidden="true" class="marquee__group">
          <p>冬来りなば春遠からじ</p>
          <p>努力は夢中に勝てない。</p>
        </div>
        <div aria-hidden="true" class="marquee__group">
          <p>冬来りなば春遠からじ</p>
          <p>努力は夢中に勝てない。</p>
        </div>
      </div>
    </article>
  </div>
  <script src="main.js"></script>
  <script src="lanyard.js"></script>
</body>
